name: Quality Gate
# Twarda sciana L3 — na KAZDY push i PR, niezaleznie kto/co pisalo kod.
# Kroki npm pomijaja sie same w repo bez package.json (assets/placeholder).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Build + Lint + Typecheck + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: 20

      - name: Install
        if: hashFiles('package.json') != ''
        run: npm ci || npm install

      - name: Lint
        if: hashFiles('package.json') != ''
        run: npm run lint --if-present

      - name: Typecheck
        if: hashFiles('tsconfig.json') != ''
        run: npx tsc --noEmit

      - name: Tests
        if: hashFiles('package.json') != ''
        run: npm test --if-present -- --run

      - name: Build
        if: hashFiles('package.json') != ''
        run: npm run build --if-present

      - name: Coverage (jesli projekt ma prog)
        if: hashFiles('package.json') != ''
        run: npm run test:coverage --if-present -- --run

      - name: Dependency audit (high+)
        if: hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=high

      - name: License check (copyleft blokuje sprzedaz)
        if: hashFiles('package-lock.json') != ''
        run: npx --yes license-checker-rseidelsohn --production --summary --failOn "GPL;AGPL;SSPL"

  security:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config auto --error --exclude node_modules --exclude dist

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: hashFiles('playwright.config.ts', 'playwright.config.js') != ''
        with:
          node-version: 20

      - name: Install + smoke test
        if: hashFiles('playwright.config.ts', 'playwright.config.js') != ''
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium
          npx playwright test --reporter=line
